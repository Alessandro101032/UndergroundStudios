<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="/css/contact.css">

</head>
<body>

    <div class="contact3">
        <form
          class="contact-form" method="POST"
          action="https://script.google.com/macros/s/AKfycbzDcjauZGtn9nplRewCgMJ1WJSHnZjhCmmRwAB80anZaqa1upyCe-NHGoB-FNKhh44/exec ">
        <h1 style="text-align: center">Contactează-ne</h1> <br>
          <div class="cont1">
            <h3>Nume</h3>
            <h3>Prenume</h3>
          </div>
          <div class="cont2">
            <input class="sty" name="Nume" type="text" placeholder="Nume" required/>
            <input class="sty" name="Prenume" type="text" placeholder="Prenume" required/>
          </div>
          <div class="cont3">
            <h3>Email</h3>
            <h3>Nr.Telefon</h3>
          </div>
          <div class="cont4">
            <input class="sty" name="Email" type="email" placeholder="Email" required/>
            <input class="sty" name="Nr.Telefon" type="tel" placeholder="Nr.Telefon" required/>
          </div>
          <div class="cont5">
            <h3>Oraș</h3>
            <h3>Observații</h3>
          </div>
          <div class="cont6">
            <input class="sty" name="Oraș" type="text" placeholder="Oraș" required/>
            <input class="sty" name="Observații" type="text" placeholder="Observații"/>
          </div> <br><br>
          <button class="button" type="submit">Send</button>
        </form>
        </div>

</body>
</html>
