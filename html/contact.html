  <div class="contact3">
    <form class="contact-form" method="POST" action="https://script.google.com/macros/s/AKfycbzDcjauZGtn9nplRewCgMJ1WJSHnZjhCmmRwAB80anZaqa1upyCe-NHGoB-FNKhh44/exec">
      <h1>Contactează-ne</h1>

      <div class="form-grid">
        <div class="form-field">
          <label for="firstName">Name</label>
          <input class="input" id="firstName" name="Name" type="text" placeholder="John" required />
        </div>

        <div class="form-field">
          <label for="lastName">Surname</label>
          <input class="input" id="lastName" name="Surname" type="text" placeholder="Doe" required />
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input class="input" id="email" name="Email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-field">
          <label for="phone">Phone Number</label>
          <input class="input" id="phone" name="Phone Number" type="tel" placeholder="(+40) 712 345 678" required />
        </div>

        <div class="form-field">
          <label for="city">City</label>
          <input class="input" id="city" name="City" type="text" placeholder="București" required />
        </div>

        <div class="form-field">
          <label for="others">Others</label>
          <input class="input" id="others" name="Others" type="text" placeholder="Optional details" />
        </div>

        <div class="form-field full">
          <button class="button" type="submit">Send</button>
        </div>
      </div>

      <p class="helper">Trimite formularul și te vom contacta în cel mai scurt timp.</p>
    </form>
  </div>
