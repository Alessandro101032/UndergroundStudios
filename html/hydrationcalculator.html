    <h1 class="h1">Daily Hydration Calculator</h1>
    <p>Enter your weight in kg:</p>
    <input type="number" id="weight" placeholder="Weight in kg">
    <br>
    <button onclick="calculateWater()">Calculate</button>
    <div id="result"></div>

    <script>
    function calculateWater(){
    let weight = document.getElementById("weight").value;
    let water = weight * 35;
    let liters = (water/1000).toFixed(2);
    document.getElementById("result").innerHTML =
    "You should drink about " + liters + " liters of water per day.";
    }
    </script>
